name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      
      # 👇 이 부분에 깃허브 통행증(GH_TOKEN)을 쥐여주었습니다!
      - run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - uses: actions/upload-artifact@v4
        with:
          name: 업무관리_프로그램_설치파일
          path: dist/*.exe
